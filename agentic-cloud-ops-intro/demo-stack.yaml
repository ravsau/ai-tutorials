AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudYeti Agentic AI Demo - Intro Module
  A simple VPC with an EC2 web server. Deploy healthy first, then "break" it
  by flipping the parameter — this misconfigures the security group and NACL,
  simulating a real infrastructure misconfiguration that blocks traffic.
  The agent investigates and finds the root cause.
  Cost: ~$0.01/hr (t3.micro, no NAT, no LB)

Parameters:
  DeployBrokenVersion:
    Type: String
    Default: 'false'
    AllowedValues: ['true', 'false']
    Description: >
      Set to 'true' to simulate a bad infrastructure change:
      - Security group inbound rule gets changed from port 80 to port 8080 (wrong port)
      - NACL gets an explicit deny on port 80 inbound (overzealous lockdown)
      This is the classic "someone changed the SG/NACL and now nothing works" scenario.

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Conditions:
  IsBroken: !Equals [!Ref DeployBrokenVersion, 'true']

Resources:

  # ============================================================
  # NETWORKING - VPC, Subnet, IGW, Route Table
  # ============================================================

  DemoVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: cloudyeti-demo-vpc
        - Key: Project
          Value: cloudyeti-agentic-demo
        - Key: Environment
          Value: demo

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DemoVPC
      CidrBlock: 10.0.1.0/24
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: cloudyeti-demo-public-subnet

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: cloudyeti-demo-igw

  GatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref DemoVPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DemoVPC
      Tags:
        - Key: Name
          Value: cloudyeti-demo-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: GatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # ============================================================
  # NACL - The "overzealous lockdown" when broken
  # ============================================================

  DemoNACL:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref DemoVPC
      Tags:
        - Key: Name
          Value: cloudyeti-demo-nacl

  NACLSubnetAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      NetworkAclId: !Ref DemoNACL

  # Allow all outbound (always)
  NACLOutboundAllow:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DemoNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0

  # Allow all inbound (always - baseline)
  NACLInboundAllow:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref DemoNACL
      RuleNumber: 100
      Protocol: -1
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0

  # THE BUG (only when broken): Deny HTTP port 80 inbound at NACL level
  # Rule 50 evaluates before rule 100, so this blocks port 80
  NACLDenyHTTP:
    Type: AWS::EC2::NetworkAclEntry
    Condition: IsBroken
    Properties:
      NetworkAclId: !Ref DemoNACL
      RuleNumber: 50
      Protocol: 6
      PortRange:
        From: 80
        To: 80
      RuleAction: deny
      Egress: false
      CidrBlock: 0.0.0.0/0

  # ============================================================
  # SECURITY GROUP - The "wrong port" when broken
  # ============================================================

  WebServerSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: CloudYeti Demo - Web Server Security Group
      VpcId: !Ref DemoVPC
      Tags:
        - Key: Name
          Value: cloudyeti-demo-web-sg

  # Healthy: allow port 80. Broken: allow port 8080 (wrong port).
  SGIngressHTTP:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref WebServerSG
      IpProtocol: tcp
      FromPort: !If [IsBroken, 8080, 80]
      ToPort: !If [IsBroken, 8080, 80]
      CidrIpv6: ::/0

  SGIngressHTTPv4:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref WebServerSG
      IpProtocol: tcp
      FromPort: !If [IsBroken, 8080, 80]
      ToPort: !If [IsBroken, 8080, 80]
      CidrIp: 0.0.0.0/0

  SGEgressAll:
    Type: AWS::EC2::SecurityGroupEgress
    Properties:
      GroupId: !Ref WebServerSG
      IpProtocol: -1
      CidrIp: 0.0.0.0/0

  # ============================================================
  # EC2 INSTANCE - Simple web server (t3.micro = free tier eligible)
  # ============================================================

  WebServer:
    Type: AWS::EC2::Instance
    DependsOn: GatewayAttachment
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref LatestAmiId
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref WebServerSG
      Tags:
        - Key: Name
          Value: cloudyeti-demo-webserver
        - Key: Project
          Value: cloudyeti-agentic-demo
        - Key: Environment
          Value: demo
        - Key: Team
          Value: platform
      UserData:
        Fn::Base64: |
          #!/bin/bash
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd
          echo '<html><body><h1>CloudYeti Order Service</h1><p>Status: Healthy</p><p>Version: 1.2.3</p></body></html>' > /var/www/html/index.html

Outputs:
  WebServerPublicIP:
    Description: Public IP of the web server (curl this to test)
    Value: !GetAtt WebServer.PublicIp

  WebServerURL:
    Description: URL to test the web server
    Value: !Sub http://${WebServer.PublicIp}

  SecurityGroupId:
    Description: Security group ID (for agent investigation)
    Value: !Ref WebServerSG

  VPCId:
    Description: VPC ID
    Value: !Ref DemoVPC

  StackStatus:
    Description: Current state
    Value: !If
      - IsBroken
      - >
          BROKEN - SG allows 8080 instead of 80, NACL denies port 80.
          Web server is running but unreachable on port 80.
      - >
          HEALTHY - SG allows 80, NACL allows all. Web server reachable.

  DemoInstructions:
    Description: How to run the demo
    Value: >
      STEP 1: Deploy with DeployBrokenVersion=false. Verify: curl the WebServerURL.
      STEP 2: Update stack with DeployBrokenVersion=true. curl will now hang/fail.
      STEP 3: Tell your agent: "Our web server at <IP> is unreachable. It was working
      earlier today. Investigate why traffic can't reach it."
      The agent should find: SG only allows 8080 (not 80) and NACL has an explicit
      deny on port 80. Two layers of misconfiguration - classic cloud engineering debug.
