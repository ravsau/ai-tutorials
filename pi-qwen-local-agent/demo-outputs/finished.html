<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Lab — Starter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg:           #f5f5f5;
            --card-bg:      #ffffff;
            --card-border:  #e0e0e0;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --shadow:       0 4px 16px rgba(0, 0, 0, 0.06);
            --toggle-bg:    #e0e0e0;
            --toggle-hover: #d0d0d0;
            --icon-color:   #1a1a1a;
        }

        body.dark {
            --bg:           #111113;
            --card-bg:      #1c1c1f;
            --card-border:  #2a2a2d;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --shadow:       0 4px 16px rgba(0, 0, 0, 0.3);
            --toggle-bg:    #2a2a2d;
            --toggle-hover: #3a3a3d;
            --icon-color:   #f0f0f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            transition: background 0.35s ease, color 0.35s ease;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 540px;
            box-shadow: var(--shadow);
            position: relative;
            transition: background 0.35s ease, border-color 0.35s ease, box-shadow 0.35s ease;
        }

        .toggle-btn {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            width: 40px;
            height: 40px;
            border: 1px solid var(--card-border);
            border-radius: 50%;
            background: var(--toggle-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.25s ease, border-color 0.35s ease, transform 0.15s ease;
        }

        .toggle-btn:hover {
            background: var(--toggle-hover);
            transform: scale(1.08);
        }

        .toggle-btn:active {
            transform: scale(0.95);
        }

        .toggle-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--icon-color);
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.35s ease;
        }

        .icon-moon, .icon-sun {
            position: absolute;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        body:not(.dark) .icon-sun {
            opacity: 0;
            transform: rotate(90deg) scale(0.5);
        }

        body:not(.dark) .icon-moon {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        body.dark .icon-moon {
            opacity: 0;
            transform: rotate(-90deg) scale(0.5);
        }

        body.dark .icon-sun {
            opacity: 1;
            transform: rotate(0deg) scale(1);
        }

        h1 {
            margin-bottom: 1rem;
            font-size: 1.75rem;
        }

        p {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 0.75rem;
            transition: color 0.35s ease;
        }

        p:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <button class="toggle-btn" aria-label="Toggle dark mode">
            <svg class="icon-moon" viewBox="0 0 24 24">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
            <svg class="icon-sun" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="4"/>
                <line x1="12" y1="1"  x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
        </button>
        <h1>Dark Mode Lab</h1>
        <p>This is the starter page for the Pi + Qwen 3.6 dark mode toggle lab.</p>
        <p>Open this file in your browser, then ask Pi to add a dark mode toggle. Watch what your local agent does — and iterate from there.</p>
        <p>Your final result will be different from anyone else's. That is the point.</p>
    </div>

    <script>
        const toggleBtn = document.querySelector('.toggle-btn');
        const root      = document.body;

        // Respect saved preference or system setting
        const stored = localStorage.getItem('dark-mode');
        if (stored === 'true' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            root.classList.add('dark');
        }

        toggleBtn.addEventListener('click', () => {
            root.classList.toggle('dark');
            localStorage.setItem('dark-mode', root.classList.contains('dark'));
        });
    </script>
</body>
</html>
