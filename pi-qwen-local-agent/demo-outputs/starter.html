<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Dark Mode Lab — Starter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e0e0e0;

        }

            color: #555;

<body>
    <div class="card">
        <h1>Dark Mode Lab</h1>
        <p>This is the starter page for the Pi + Qwen 3.6 dark mode toggle lab.</p>
        <p>Open this file in your browser, then ask Pi to add a dark mode toggle. Watch what your local agent does — and iterate from there.</p>
